<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام إدارة الفواتير والأرشفة</title>
    <link rel="stylesheet" href="https://cloudflare.com">
    <script src="https://cloudflare.com"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        :root { --primary: #2c3e50; --secondary: #3498db; --success: #27ae60; --light: #ecf0f1; --dark: #2c3e50; }
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; }

        /* Sidebar - Right Side */
        .sidebar { width: 280px; background: var(--primary); color: white; position: fixed; right: 0; height: 100vh; z-index: 1000; box-shadow: -4px 0 15px rgba(0,0,0,0.1); }
        .logo { padding: 30px 20px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .logo i { font-size: 2.5rem; color: var(--secondary); margin-bottom: 10px; }
        .logo-text { font-size: 1.3rem; font-weight: bold; }
        .nav-menu { padding: 20px 0; }
        .nav-item { padding: 15px 25px; cursor: pointer; transition: all 0.3s ease; display: flex; align-items: center; gap: 15px; border-right: 4px solid transparent; }
        .nav-item:hover, .nav-item.active { background: rgba(255,255,255,0.1); border-right-color: var(--secondary); }

        /* Main Content - Pushed Left */
        .main-content { flex: 1; margin-right: 280px; padding: 30px; width: calc(100% - 280px); }
        .header { background: white; padding: 20px 30px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); margin-bottom: 30px; display: flex; justify-content: space-between; align-items: center; }
        
        .section-title { font-size: 1.5rem; font-weight: bold; color: var(--dark); }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); margin-bottom: 25px; }

        /* Buttons & Actions */
        .btn-group { display: flex; gap: 10px; }
        .btn { padding: 10px 18px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; display: flex; align-items: center; gap: 8px; font-size: 0.9rem; transition: 0.3s; }
        .btn-primary { background: var(--secondary); color: white; }
        .btn-success { background: var(--success); color: white; }
        .btn-excel { background: #1D6F42; color: white; }

        /* Forms & Tables */
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; font-size: 1rem; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 15px; text-align: right; border-bottom: 1px solid #eee; }
        th { background: #f8f9fa; color: var(--primary); }

        .content-section { display: none; animation: fadeIn 0.4s ease; }
        .content-section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; } }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="logo">
            <i class="fas fa-file-invoice-dollar"></i>
            <div class="logo-text">نظام أبعاد</div>
        </div>
        <nav class="nav-menu">
            <div class="nav-item active" onclick="showSection('dashboard', this)"><i class="fas fa-home"></i> الرئيسية</div>
            <div class="nav-item" onclick="showSection('add-invoice', this)"><i class="fas fa-plus-circle"></i> إضافة فاتورة</div>
            <div class="nav-item" onclick="showSection('archive', this)"><i class="fas fa-archive"></i> الأرشيف</div>
        </nav>
    </aside>

    <main class="main-content">
        <header class="header">
            <div class="section-title" id="page-title">لوحة التحكم</div>
            <div class="btn-group">
                <button class="btn btn-excel" onclick="exportToExcel()"><i class="fas fa-file-export"></i> تصدير إكسل</button>
                <label class="btn btn-primary" style="cursor:pointer;">
                    <i class="fas fa-file-import"></i> استيراد إكسل
                    <input type="file" id="importFile" hidden onchange="importFromExcel(event)">
                </label>
            </div>
        </header>

        <section id="dashboard" class="content-section active">
            <div class="card">
                <h3>مرحباً بك في نظام إدارة الفواتير</h3>
                <p style="margin-top:15px; color:#666;">يمكنك البدء بإضافة فاتورة جديدة أو استيراد بياناتك من ملف إكسل مباشرة.</p>
            </div>
        </section>

        <section id="add-invoice" class="content-section">
            <div class="card">
                <h3>بيانات الفاتورة الجديدة</h3>
                <input type="text" id="custName" placeholder="اسم العميل">
                <input type="date" id="invDate">
                <input type="number" id="invAmount" placeholder="المبلغ الإجمالي">
                <button class="btn btn-success" style="width:100%; justify-content:center; margin-top:10px;" onclick="saveInvoice()">
                    <i class="fas fa-save"></i> حفظ في قاعدة البيانات
                </button>
            </div>
        </section>

        <section id="archive" class="content-section">
            <div class="card">
                <h3>أرشيف العمليات</h3>
                <table id="invoiceTable">
                    <thead>
                        <tr>
                            <th>العميل</th>
                            <th>التاريخ</th>
                            <th>المبلغ</th>
                        </tr>
                    </thead>
                    <tbody id="invoiceBody">
                        <!-- البيانات ستظهر هنا -->
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <script>
        function showSection(id, element) {
            document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            element.classList.add('active');
            document.getElementById('page-title').innerText = element.innerText;
            if(id === 'archive') renderTable();
        }

        async function saveInvoice() {
            const name = document.getElementById('custName').value;
            const date = document.getElementById('invDate').value;
            const amount = document.getElementById('invAmount').value;

            if(!name || !date || !amount) return alert("يرجى إكمال الحقول");

            const response = await fetch('/api/invoices', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, date, amount })
            });

            if(response.ok) {
                alert("تم الحفظ بنجاح");
                document.getElementById('custName').value = '';
                showSection('archive', document.querySelectorAll('.nav-item')[2]);
            }
        }

        async function renderTable() {
            const response = await fetch('/api/invoices');
            const data = await response.json();
            const body = document.getElementById('invoiceBody');
            body.innerHTML = data.map(i => `
                <tr>
                    <td>${i.customer_name}</td>
                    <td>${new Date(i.invoice_date).toLocaleDateString('ar-EG')}</td>
                    <td>${i.amount} ر.س</td>
                </tr>
            `).join('');
        }

        function exportToExcel() {
            const table = document.getElementById("invoiceTable");
            const wb = XLSX.utils.table_to_book(table);
            XLSX.writeFile(wb, "تقرير_الفواتير.xlsx");
        }

        function importFromExcel(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = async function(event) {
                const data = new Uint8Array(event.target.result);
                const workbook = XLSX.read(data, {type: 'array'});
                const sheet = workbook.Sheets[workbook.SheetNames[0]];
                const jsonData = XLSX.utils.sheet_to_json(sheet);
                
                for(let row of jsonData) {
                    await fetch('/api/invoices', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            name: row.العميل || row.name,
                            date: row.التاريخ || row.date,
                            amount: row.المبلغ || row.amount
                        })
                    });
                }
                alert("تم استيراد البيانات لقاعدة البيانات بنجاح");
                renderTable();
            };
            reader.readAsArrayBuffer(file);
        }
    </script>
</body>
</html>
