<script>
    // 1. التنقل بين الأقسام
    function showSection(id, element) {
        document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(element) element.classList.add('active');
        if(id === 'archive') loadInvoices(); // تحميل البيانات عند فتح الأرشيف
    }

    // 2. حفظ فاتورة جديدة إلى قاعدة بيانات Render
    async function saveInvoice() {
        const name = document.getElementById('custName')?.value;
        const date = document.getElementById('invDate')?.value;
        const amount = document.getElementById('invAmount')?.value;

        if(!name || !amount) return alert("يرجى إدخال اسم العميل والمبلغ");

        try {
            const res = await fetch('/api/invoices', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, date, amount })
            });
            if(res.ok) {
                alert("تم الحفظ في قاعدة البيانات بنجاح");
                showSection('archive');
            }
        } catch (err) { alert("خطأ في الاتصال بالسيرفر"); }
    }

    // 3. جلب البيانات من قاعدة البيانات وعرضها في الجدول
    async function loadInvoices() {
        try {
            const res = await fetch('/api/invoices');
            const data = await res.json();
            const body = document.getElementById('invoiceBody');
            if(body) {
                body.innerHTML = data.map(i => `
                    <tr>
                        <td>${i.customer_name}</td>
                        <td>${new Date(i.invoice_date).toLocaleDateString('ar-SA')}</td>
                        <td>${i.amount} ر.س</td>
                    </tr>`).join('');
            }
        } catch (err) { console.error("خطأ في جلب البيانات"); }
    }

    // 4. تصدير إلى إكسل
    function exportToExcel() {
        const table = document.querySelector("table");
        const wb = XLSX.utils.table_to_book(table);
        XLSX.writeFile(wb, "تقرير_الفواتير.xlsx");
    }

    // 5. استيراد من إكسل وحفظه مباشرة في قاعدة البيانات
    function importFromExcel(e) {
        const reader = new FileReader();
        reader.onload = async (event) => {
            const workbook = XLSX.read(new Uint8Array(event.target.result), {type: 'array'});
            const jsonData = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
            
            for(let row of jsonData) {
                await fetch('/api/invoices', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        name: row.العميل || row.name,
                        date: row.التاريخ || row.date,
                        amount: row.المبلغ || row.amount
                    })
                });
            }
            alert("تم استيراد البيانات وحفظها بنجاح");
            loadInvoices();
        };
        reader.readAsArrayBuffer(e.target.files[0]);
    }
</script>
