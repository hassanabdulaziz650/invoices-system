<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام إدارة الفواتير</title>
    <link rel="stylesheet" href="https://cloudflare.com">
    <script src="https://cloudflare.com"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; }
        .sidebar { width: 260px; background: #2c3e50; color: white; position: fixed; height: 100vh; }
        .nav-item { padding: 15px 25px; cursor: pointer; display: flex; align-items: center; gap: 12px; transition: 0.3s; }
        .nav-item.active { background: rgba(255,255,255,0.1); border-right: 4px solid #3498db; }
        .main-content { flex: 1; margin-right: 260px; padding: 20px; width: calc(100% - 260px); }
        
        /* تصميم الأيقونات المطلوب */
        .dashboard-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-bottom: 25px; }
        .card { background: white; padding: 20px; border-radius: 15px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .card-icon { width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 10px; font-size: 1.2rem; }
        .val { font-size: 1.8rem; font-weight: bold; color: #2c3e50; }
        .label { color: #7f8c8d; font-size: 0.9rem; margin-bottom: 5px; }

        .btn { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; color: white; display: inline-flex; align-items: center; gap: 8px; }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 15px; overflow: hidden; margin-top: 20px; }
        th, td { padding: 15px; text-align: right; border-bottom: 1px solid #eee; }
        .content-section { display: none; }
        .content-section.active { display: block; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; }
    </style>
</head>
<body>
    <aside class="sidebar">
        <div style="padding:30px; text-align:center; font-weight:bold; font-size:1.4rem; border-bottom:1px solid #444;">نظام أبعاد</div>
        <div class="nav-item active" onclick="showSection('dashboard', this)"><i class="fas fa-chart-line"></i> الرئيسية</div>
        <div class="nav-item" onclick="showSection('add', this)"><i class="fas fa-plus-circle"></i> إضافة فاتورة</div>
        <div class="nav-item" onclick="showSection('archive', this)"><i class="fas fa-history"></i> الأرشيف</div>
    </aside>

    <main class="main-content">
        <!-- الأيقونات كما في الصورة -->
        <div class="dashboard-cards" id="stats">
            <div class="card"><div class="card-icon" style="background:#fee; color:#e74c3c"><i class="fas fa-times"></i></div><div class="label">ملغية</div><div class="val" id="t4">0</div></div>
            <div class="card"><div class="card-icon" style="background:#fff4e6; color:#f39c12"><i class="fas fa-clock"></i></div><div class="label">معلقة</div><div class="val" id="t3">0</div></div>
            <div class="card"><div class="card-icon" style="background:#efe; color:#27ae60"><i class="fas fa-check"></i></div><div class="label">تم التوصيل</div><div class="val" id="t2">0</div></div>
            <div class="card"><div class="card-icon" style="background:#eef; color:#3498db"><i class="fas fa-file-invoice"></i></div><div class="label">إجمالي الفواتير</div><div class="val" id="t1">0</div></div>
        </div>

        <section id="dashboard" class="content-section active">
            <div class="card"><h3>مرحباً بك</h3><p>النظام جاهز للعمل والمزامنة مع قاعدة بيانات Render.</p></div>
        </section>

        <section id="add" class="content-section">
            <div class="card">
                <h3>إضافة فاتورة يدوياً</h3>
                <input type="text" id="cust" placeholder="اسم العميل">
                <input type="number" id="amt" placeholder="المبلغ">
                <select id="stat">
                    <option value="تم التوصيل">تم التوصيل</option>
                    <option value="معلقة">معلقة</option>
                    <option value="ملغية">ملغية</option>
                </select>
                <button class="btn" style="background:#27ae60; width:100%" onclick="handleSave()">حفظ الفاتورة</button>
            </div>
        </section>

        <section id="archive" class="content-section">
            <div style="margin-bottom:15px; display:flex; gap:10px;">
                <button class="btn" style="background:#3498db" onclick="exportData()"><i class="fas fa-download"></i> تصدير</button>
                <label class="btn" style="background:#27ae60; cursor:pointer;">
                    <i class="fas fa-upload"></i> استيراد ملف إكسل 
                    <input type="file" hidden onchange="handleImport(event)">
                </label>
            </div>
            <table>
                <thead><tr><th>العميل</th><th>التاريخ</th><th>المبلغ</th><th>الحالة</th></tr></thead>
                <tbody id="tableBody"></tbody>
            </table>
        </section>
    </main>

    <script>
        function showSection(id, el) {
            document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(el) el.classList.add('active');
            fetchData();
        }

        async function handleSave() {
            const data = { name: document.getElementById('cust').value, amount: document.getElementById('amt').value, status: document.getElementById('stat').value };
            const res = await fetch('/api/invoices', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data) });
            if(res.ok) { alert("تم الحفظ"); fetchData(); showSection('archive'); }
        }

        async function fetchData() {
            const res = await fetch('/api/invoices');
            const data = await res.json();
            document.getElementById('tableBody').innerHTML = data.map(i => `
                <tr><td>${i.customer_name}</td><td>${new Date(i.invoice_date).toLocaleDateString('ar-EG')}</td><td>${i.amount}</td><td>${i.status}</td></tr>
            `).join('');
            
            document.getElementById('t1').innerText = data.length;
            document.getElementById('t2').innerText = data.filter(i => i.status === 'تم التوصيل').length;
            document.getElementById('t3').innerText = data.filter(i => i.status === 'معلقة').length;
            document.getElementById('t4').innerText = data.filter(i => i.status === 'ملغية').length;
        }

        function exportData() {
            const wb = XLSX.utils.table_to_book(document.querySelector("table"));
            XLSX.writeFile(wb, "الفواتير.xlsx");
        }

        async function handleImport(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = async (ev) => {
                const workbook = XLSX.read(new Uint8Array(ev.target.result), {type: 'array'});
                const sheet = workbook.Sheets[workbook.SheetNames[0]];
                const rows = XLSX.utils.sheet_to_json(sheet);

                alert(`جاري استيراد ${rows.length} صف... انتظر قليلاً`);

                for(let row of rows) {
                    const keys = Object.keys(row);
                    // محاولة ذكية لقراءة البيانات من أي عمود
                    await fetch('/api/invoices', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({
                            name: row["الاسم"] || row["العميل"] || row[keys[0]],
                            amount: row["المبلغ"] || row["القيمة"] || row[keys[1]] || 0,
                            status: row["الحالة"] || "تم التوصيل"
                        })
                    });
                }
                alert("تم الاستيراد بنجاح");
                fetchData();
            };
            reader.readAsArrayBuffer(file);
        }
        window.onload = fetchData;
    </script>
</body>
</html>
