<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام إدارة الفواتير</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
            padding: 20px;
        }
        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .stat-card .icon { font-size: 2.5rem; margin-bottom: 10px; }
        .stat-card .number { font-size: 2rem; font-weight: 700; color: #333; }
        .stat-card .label { color: #666; font-size: 0.9rem; }
        .stat-card.total { border-top: 4px solid #667eea; }
        .stat-card.delivered { border-top: 4px solid #4CAF50; }
        .stat-card.pending { border-top: 4px solid #FF9800; }
        .stat-card.cancelled { border-top: 4px solid #f44336; }
        .stat-card.returned { border-top: 4px solid #9C27B0; }

        .main-grid {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 20px;
        }
        .form-section, .table-section {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .form-section h2, .table-section h2 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 1.3rem;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-weight: 600;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-family: 'Cairo', sans-serif;
        }
        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-family: 'Cairo', sans-serif;
            font-weight: 700;
            cursor: pointer;
            font-size: 1rem;
            margin-bottom: 10px;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .btn-success {
            background: linear-gradient(135deg, #4CAF50 0%, #45a049 100%);
            color: white;
        }
        .table-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .search-box {
            display: flex;
            gap: 10px;
        }
        .search-box input, .search-box select {
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-family: 'Cairo', sans-serif;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 12px;
            text-align: right;
            border-bottom: 1px solid #eee;
        }
        th {
            background: #f8f9fa;
            color: #667eea;
            font-weight: 700;
        }
        .status-badge {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
        }
        .status-delivered { background: #e8f5e9; color: #2e7d32; }
        .status-pending { background: #fff3e0; color: #ef6c00; }
        .status-cancelled { background: #ffebee; color: #c62828; }
        .status-returned { background: #f3e5f5; color: #6a1b9a; }
        .actions {
            display: flex;
            gap: 5px;
        }
        .btn-small {
            padding: 5px 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-family: 'Cairo', sans-serif;
            font-size: 0.8rem;
        }
        .btn-edit { background: #2196F3; color: white; }
        .btn-delete { background: #f44336; color: white; }
        .btn-status { background: #FF9800; color: white; }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: white;
            border-radius: 15px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .modal-header h3 { color: #667eea; }
        .close-btn {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: #999;
        }
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: white;
            padding: 15px 25px;
            border-radius: 10px;
            z-index: 2000;
            display: none;
            font-weight: 600;
        }
        .toast.show { display: block; }
        .toast.success { background: #4CAF50; }
        .toast.error { background: #f44336; }

        @media (max-width: 768px) {
            .main-grid { grid-template-columns: 1fr; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .table-header { flex-direction: column; align-items: stretch; }
            .search-box { flex-direction: column; }
            .search-box input { width: 100%; }
        }
        .empty-state {
            text-align: center;
            padding: 40px;
            color: #999;
        }
        .loading {
            text-align: center;
            padding: 40px;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 نظام إدارة الفواتير</h1>
            <p>تتبع وإدارة فواتير التوصيل بكل سهولة</p>
        </div>

        <div class="stats-grid">
            <div class="stat-card total">
                <div class="icon">📋</div>
                <div class="number" id="stat-total">0</div>
                <div class="label">إجمالي الفواتير</div>
            </div>
            <div class="stat-card delivered">
                <div class="icon">✅</div>
                <div class="number" id="stat-delivered">0</div>
                <div class="label">تم التوصيل</div>
            </div>
            <div class="stat-card pending">
                <div class="icon">⏳</div>
                <div class="number" id="stat-pending">0</div>
                <div class="label">معلقة</div>
            </div>
            <div class="stat-card cancelled">
                <div class="icon">❌</div>
                <div class="number" id="stat-cancelled">0</div>
                <div class="label">ملغية</div>
            </div>
            <div class="stat-card returned">
                <div class="icon">🔄</div>
                <div class="number" id="stat-returned">0</div>
                <div class="label">مرتجع</div>
            </div>
        </div>

        <div class="main-grid">
            <div class="form-section">
                <h2>📝 إضافة فاتورة جديدة</h2>
                <form id="invoice-form">
                    <div class="form-group">
                        <label>رقم الفاتورة *</label>
                        <input type="text" id="invoice_number" required placeholder="مثال: INV-001">
                    </div>
                    <div class="form-group">
                        <label>تاريخ الفاتورة *</label>
                        <input type="date" id="invoice_date" required>
                    </div>
                    <div class="form-group">
                        <label>اسم العميل *</label>
                        <input type="text" id="customer_name" required placeholder="اسم العميل">
                    </div>
                    <div class="form-group">
                        <label>مندوب المبيعات</label>
                        <input type="text" id="sales_rep" placeholder="اسم المندوب">
                    </div>
                    <div class="form-group">
                        <label>حالة التوصيل</label>
                        <select id="delivery_status">
                            <option value="معلقة">معلقة</option>
                            <option value="تم التوصيل">تم التوصيل</option>
                            <option value="ملغية">ملغية</option>
                            <option value="مرتجع">مرتجع</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>اسم السائق</label>
                        <input type="text" id="driver_name" placeholder="اسم السائق">
                    </div>
                    <div class="form-group">
                        <label>الفرع</label>
                        <input type="text" id="branch" placeholder="الفرع">
                    </div>
                    <div class="form-group">
                        <label>ملاحظات</label>
                        <input type="text" id="notes" placeholder="ملاحظات إضافية">
                    </div>
                    <button type="submit" class="btn btn-primary">💾 حفظ الفاتورة</button>
                    <button type="button" class="btn btn-success" onclick="exportToExcel()">📥 تصدير Excel</button>
                </form>
            </div>

            <div class="table-section">
                <div class="table-header">
                    <h2>📋 قائمة الفواتير</h2>
                    <div class="search-box">
                        <input type="text" id="search-input" placeholder="بحث..." onkeyup="searchInvoices()">
                        <select id="filter-status" onchange="filterByStatus()">
                            <option value="">الكل</option>
                            <option value="معلقة">معلقة</option>
                            <option value="تم التوصيل">تم التوصيل</option>
                            <option value="ملغية">ملغية</option>
                            <option value="مرتجع">مرتجع</option>
                        </select>
                    </div>
                </div>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>رقم الفاتورة</th>
                                <th>التاريخ</th>
                                <th>العميل</th>
                                <th>الحالة</th>
                                <th>السائق</th>
                                <th>الفرع</th>
                                <th>الإجراءات</th>
                            </tr>
                        </thead>
                        <tbody id="invoices-table">
                            <tr>
                                <td colspan="8" class="loading">جاري التحميل...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div class="modal" id="edit-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>✏️ تعديل الفاتورة</h3>
                <button class="close-btn" onclick="closeModal()">&times;</button>
            </div>
            <form id="edit-form">
                <input type="hidden" id="edit-id">
                <div class="form-group">
                    <label>رقم الفاتورة</label>
                    <input type="text" id="edit-invoice_number" required>
                </div>
                <div class="form-group">
                    <label>التاريخ</label>
                    <input type="date" id="edit-invoice_date" required>
                </div>
                <div class="form-group">
                    <label>العميل</label>
                    <input type="text" id="edit-customer_name" required>
                </div>
                <div class="form-group">
                    <label>الحالة</label>
                    <select id="edit-delivery_status">
                        <option value="معلقة">معلقة</option>
                        <option value="تم التوصيل">تم التوصيل</option>
                        <option value="ملغية">ملغية</option>
                        <option value="مرتجع">مرتجع</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>السائق</label>
                    <input type="text" id="edit-driver_name">
                </div>
                <div class="form-group">
                    <label>الفرع</label>
                    <input type="text" id="edit-branch">
                </div>
                <div class="form-group">
                    <label>ملاحظات</label>
                    <input type="text" id="edit-notes">
                </div>
                <button type="submit" class="btn btn-primary">💾 حفظ التعديلات</button>
            </form>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        const API_URL = window.location.origin;
        let invoices = [];

        document.addEventListener('DOMContentLoaded', () => {
            loadStats();
            loadInvoices();
            document.getElementById('invoice_date').valueAsDate = new Date();
        });

        async function loadStats() {
            try {
                const res = await fetch(`${API_URL}/api/stats`);
                const data = await res.json();
                if (data.success) {
                    document.getElementById('stat-total').textContent = data.data.total || 0;
                    document.getElementById('stat-delivered').textContent = data.data.delivered || 0;
                    document.getElementById('stat-pending').textContent = data.data.pending || 0;
                    document.getElementById('stat-cancelled').textContent = data.data.cancelled || 0;
                    document.getElementById('stat-returned').textContent = data.data.returned || 0;
                }
            } catch (err) {
                console.error('Error loading stats:', err);
            }
        }

        async function loadInvoices(status = '', search = '') {
            try {
                let url = `${API_URL}/api/invoices`;
                const params = [];
                if (status) params.push(`status=${encodeURIComponent(status)}`);
                if (search) params.push(`search=${encodeURIComponent(search)}`);
                if (params.length) url += '?' + params.join('&');

                const res = await fetch(url);
                const data = await res.json();
                
                if (data.success) {
                    invoices = data.data;
                    renderTable(invoices);
                }
            } catch (err) {
                showToast('خطأ في تحميل البيانات', 'error');
            }
        }

        function renderTable(data) {
            const tbody = document.getElementById('invoices-table');
            
            if (data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="8" class="empty-state"><div style="font-size:4rem; margin-bottom:10px;">📭</div><div>لا توجد فواتير</div></td></tr>';
                return;
            }

            tbody.innerHTML = data.map((inv, index) => `
                <tr>
                    <td>${index + 1}</td>
                    <td>${inv.invoice_number}</td>
                    <td>${inv.invoice_date}</td>
                    <td>${inv.customer_name}</td>
                    <td><span class="status-badge status-${getStatusClass(inv.delivery_status)}">${inv.delivery_status}</span></td>
                    <td>${inv.driver_name || '-'}</td>
                    <td>${inv.branch || '-'}</td>
                    <td>
                        <div class="actions">
                            <button class="btn-small btn-edit" onclick="editInvoice(${inv.id})">✏️</button>
                            <button class="btn-small btn-status" onclick="changeStatus(${inv.id}, '${inv.delivery_status}')">🔄</button>
                            <button class="btn-small btn-delete" onclick="deleteInvoice(${inv.id})">🗑️</button>
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        function getStatusClass(status) {
            const map = { 'تم التوصيل': 'delivered', 'معلقة': 'pending', 'ملغية': 'cancelled', 'مرتجع': 'returned' };
            return map[status] || 'pending';
        }

        document.getElementById('invoice-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const invoice = {
                invoice_number: document.getElementById('invoice_number').value,
                invoice_date: document.getElementById('invoice_date').value,
                customer_name: document.getElementById('customer_name').value,
                sales_rep: document.getElementById('sales_rep').value,
                delivery_status: document.getElementById('delivery_status').value,
                driver_name: document.getElementById('driver_name').value,
                branch: document.getElementById('branch').value,
                notes: document.getElementById('notes').value,
                items: []
            };

            try {
                const res = await fetch(`${API_URL}/api/invoices`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(invoice)
                });
                const data = await res.json();
                
                if (data.success) {
                    showToast('تم إضافة الفاتورة بنجاح!', 'success');
                    document.getElementById('invoice-form').reset();
                    document.getElementById('invoice_date').valueAsDate = new Date();
                    loadStats();
                    loadInvoices();
                } else {
                    showToast(data.error || 'خطأ في الإضافة', 'error');
                }
            } catch (err) {
                showToast('خطأ في الاتصال', 'error');
            }
        });

        async function editInvoice(id) {
            const inv = invoices.find(i => i.id === id);
            if (!inv) return;

            document.getElementById('edit-id').value = inv.id;
            document.getElementById('edit-invoice_number').value = inv.invoice_number;
            document.getElementById('edit-invoice_date').value = inv.invoice_date;
            document.getElementById('edit-customer_name').value = inv.customer_name;
            document.getElementById('edit-delivery_status').value = inv.delivery_status;
            document.getElementById('edit-driver_name').value = inv.driver_name || '';
            document.getElementById('edit-branch').value = inv.branch || '';
            document.getElementById('edit-notes').value = inv.notes || '';

            document.getElementById('edit-modal').classList.add('active');
        }

        document.getElementById('edit-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('edit-id').value;
            
            const invoice = {
                invoice_number: document.getElementById('edit-invoice_number').value,
                invoice_date: document.getElementById('edit-invoice_date').value,
                customer_name: document.getElementById('edit-customer_name').value,
                delivery_status: document.getElementById('edit-delivery_status').value,
                driver_name: document.getElementById('edit-driver_name').value,
                branch: document.getElementById('edit-branch').value,
                notes: document.getElementById('edit-notes').value
            };

            try {
                const res = await fetch(`${API_URL}/api/invoices/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(invoice)
                });
                const data = await res.json();
                
                if (data.success) {
                    showToast('تم التحديث بنجاح!', 'success');
                    closeModal();
                    loadStats();
                    loadInvoices();
                }
            } catch (err) {
                showToast('خطأ في التحديث', 'error');
            }
        });

        async function changeStatus(id, currentStatus) {
            const statuses = ['معلقة', 'تم التوصيل', 'ملغية', 'مرتجع'];
            const nextIndex = (statuses.indexOf(currentStatus) + 1) % statuses.length;
            const newStatus = statuses[nextIndex];

            try {
                const res = await fetch(`${API_URL}/api/invoices/${id}/status`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ delivery_status: newStatus })
                });
                const data = await res.json();
                
                if (data.success) {
                    showToast(`تم تغيير الحالة إلى: ${newStatus}`, 'success');
                    loadStats();
                    loadInvoices();
                }
            } catch (err) {
                showToast('خطأ في تغيير الحالة', 'error');
            }
        }

        async function deleteInvoice(id) {
            if (!confirm('هل أنت متأكد من حذف هذه الفاتورة؟')) return;

            try {
                const res = await fetch(`${API_URL}/api/invoices/${id}`, { method: 'DELETE' });
                const data = await res.json();
                
                if (data.success) {
                    showToast('تم الحذف بنجاح!', 'success');
                    loadStats();
                    loadInvoices();
                }
            } catch (err) {
                showToast('خطأ في الحذف', 'error');
            }
        }

        function searchInvoices() {
            const search = document.getElementById('search-input').value;
            const status = document.getElementById('filter-status').value;
            loadInvoices(status, search);
        }

        function filterByStatus() {
            const status = document.getElementById('filter-status').value;
            const search = document.getElementById('search-input').value;
            loadInvoices(status, search);
        }

        async function exportToExcel() {
            try {
                const res = await fetch(`${API_URL}/api/invoices`);
n                const data = await res.json();
                
                if (data.success && data.data.length > 0) {
                    const rows = data.data.map(inv => ({
                        'رقم الفاتورة': inv.invoice_number,
                        'التاريخ': inv.invoice_date,
                        'العميل': inv.customer_name,
                        'المندوب': inv.sales_rep,
                        'الحالة': inv.delivery_status,
                        'السائق': inv.driver_name,
                        'الفرع': inv.branch,
                        'ملاحظات': inv.notes
                    }));

                    const headers = Object.keys(rows[0]);
                    const csv = [
                        headers.join(','),
                        ...rows.map(row => headers.map(h => `"${(row[h] || '').toString().replace(/"/g, '""')}"`).join(','))
                    ].join('\n');
                    
                    const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
                    const link = document.createElement('a');
                    link.href = URL.createObjectURL(blob);
                    link.download = 'invoices.csv';
                    link.click();
                    showToast('تم التصدير بنجاح!', 'success');
                } else {
                    showToast('لا توجد بيانات للتصدير', 'error');
                }
            } catch (err) {
                showToast('خطأ في التصدير', 'error');
            }
        }

        function closeModal() {
            document.getElementById('edit-modal').classList.remove('active');
        }

        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast ${type} show`;
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        document.getElementById('edit-modal').addEventListener('click', (e) => {
            if (e.target === document.getElementById('edit-modal')) closeModal();
        });
    </script>
</body>
</html>
